<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文口试练习 | Chinese Oral Exam Practice</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700;900&display=swap');
        
        :root {
            --primary: #C41E3A;
            --primary-light: #E84A5F;
            --primary-dark: #8B0000;
            --secondary: #FFD700;
            --bg-main: #FFF9F0;
            --bg-card: #FFFFFF;
            --text-primary: #2C1810;
            --text-secondary: #6B4423;
            --border: #E8D5C4;
            --shadow: rgba(196, 30, 58, 0.1);
            --accent: #FF6B6B;
            --success: #27AE60;
            --warning: #F39C12;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, var(--bg-main) 0%, #FFF5E6 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -20%;
            width: 80%;
            height: 150%;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }
        
        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px var(--shadow);
            letter-spacing: 0.05em;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.1em;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px var(--shadow);
            border: 2px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(196, 30, 58, 0.15);
        }
        
        .card h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 0.5rem;
            display: inline-block;
        }
        
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .select-btn {
            background: linear-gradient(135deg, var(--bg-card) 0%, #FFF5E6 100%);
            border: 3px solid var(--primary);
            border-radius: 16px;
            padding: 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        .select-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--primary);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
            z-index: 0;
        }
        
        .select-btn:hover::before {
            width: 300%;
            height: 300%;
        }
        
        .select-btn:hover {
            color: white;
            border-color: var(--primary-dark);
        }
        
        .select-btn span {
            position: relative;
            z-index: 1;
        }
        
        .select-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary-dark);
            box-shadow: 0 8px 25px var(--shadow);
            transform: scale(1.05);
        }
        
        .exam-content {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2rem 0;
            border: 3px solid var(--secondary);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.2);
        }
        
        .passage {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            line-height: 2.2;
            color: var(--text-primary);
            margin: 2rem 0;
            padding: 2rem;
            background: linear-gradient(to right, #FFF9F0 0%, white 100%);
            border-left: 5px solid var(--primary);
            border-radius: 12px;
        }
        
        .image-container {
            text-align: center;
            margin: 2rem 0;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        
        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .recording-controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px var(--shadow);
            position: relative;
            overflow: hidden;
        }
        
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        
        .btn:active::after {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(196, 30, 58, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary) 0%, #FFA500 100%);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #229954 100%);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .recording-status {
            text-align: center;
            margin: 2rem 0;
            padding: 1.5rem;
            background: linear-gradient(135deg, #FFE5E5 0%, #FFF0F0 100%);
            border-radius: 16px;
            border: 2px solid var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }
        
        .recording-status.active {
            background: linear-gradient(135deg, #FFE5E5 0%, #FFD6D6 100%);
        }
        
        .recording-status h3 {
            color: var(--accent);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .timer {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
            font-family: 'Courier New', monospace;
        }
        
        .evaluation {
            margin-top: 2rem;
            padding: 2rem;
            background: linear-gradient(135deg, #F0FFF4 0%, #E8F8F5 100%);
            border-radius: 20px;
            border: 3px solid var(--success);
            animation: slideInUp 0.6s ease-out;
        }
        
        .score-display {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--success) 0%, #27AE60 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 40px rgba(39, 174, 96, 0.3);
            animation: scaleIn 0.6s ease-out;
        }
        
        .score-value {
            font-size: 4rem;
            font-weight: 900;
            color: white;
            font-family: 'Noto Serif SC', serif;
        }
        
        .feedback-section {
            margin-top: 2rem;
        }
        
        .feedback-item {
            background: white;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .feedback-item h4 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        
        .feedback-item p {
            color: var(--text-secondary);
            line-height: 1.8;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        .hidden {
            display: none;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        .instructions {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFFBF0 100%);
            border: 2px solid var(--secondary);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .instructions h3 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }
        
        .instructions ul {
            list-style: none;
            padding-left: 0;
        }
        
        .instructions li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-secondary);
        }
        
        .instructions li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--success);
            font-weight: 900;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .card {
                padding: 1.5rem;
            }
            
            .passage {
                font-size: 1.2rem;
                padding: 1.5rem;
            }
            
            .selection-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>华文口试练习</h1>
            <p class="subtitle">Chinese Oral Exam Practice for PSLE</p>
        </header>
        
        <!-- Step 1: Grade Selection -->
        <div class="card" id="gradeSelection">
            <h2>选择年级 | Select Grade</h2>
            <div class="selection-grid">
                <button class="select-btn" onclick="selectGrade('P3')">
                    <span>小学三年级<br>Primary 3</span>
                </button>
                <button class="select-btn" onclick="selectGrade('P4')">
                    <span>小学四年级<br>Primary 4</span>
                </button>
                <button class="select-btn" onclick="selectGrade('P5')">
                    <span>小学五年级<br>Primary 5</span>
                </button>
                <button class="select-btn" onclick="selectGrade('P6')">
                    <span>小学六年级<br>Primary 6 (PSLE)</span>
                </button>
            </div>
        </div>
        
        <!-- Step 2: Question Type Selection -->
        <div class="card hidden" id="typeSelection">
            <h2>选择题型 | Select Question Type</h2>
            <div class="selection-grid">
                <button class="select-btn" onclick="selectType('reading')">
                    <span>朗读短文<br>Reading Aloud</span>
                </button>
                <button class="select-btn" onclick="selectType('picture')">
                    <span>看图说话<br>Picture Description</span>
                </button>
            </div>
        </div>
        
        <!-- Step 3: Exam Content -->
        <div class="card hidden" id="examSection">
            <h2 id="examTitle"></h2>
            
            <div class="instructions">
                <h3>考试说明 | Instructions</h3>
                <ul id="instructionsList"></ul>
            </div>
            
            <div id="questionContent"></div>
            
            <div class="recording-controls">
                <button class="btn btn-secondary" onclick="generateNewQuestion()">
                    生成新题目 | New Question
                </button>
                <button class="btn btn-primary" id="startRecordBtn" onclick="startRecording()">
                    开始录音 | Start Recording
                </button>
                <button class="btn btn-primary hidden" id="stopRecordBtn" onclick="stopRecording()">
                    停止录音 | Stop Recording
                </button>
                <button class="btn btn-success hidden" id="submitBtn" onclick="submitAnswer()">
                    提交评分 | Submit for Grading
                </button>
            </div>
            
            <div class="recording-status hidden" id="recordingStatus">
                <h3>录音中 | Recording...</h3>
                <div class="timer" id="timer">00:00</div>
            </div>
            
            <div class="hidden" id="loadingSection">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在评分，请稍候... | Evaluating, please wait...</p>
                </div>
            </div>
            
            <div class="hidden" id="evaluationSection"></div>
        </div>
    </div>

    <script>
        let selectedGrade = '';
        let selectedType = '';
        let currentQuestion = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimer = null;
        let recordingSeconds = 0;
        let transcript = '';

        function selectGrade(grade) {
            selectedGrade = grade;
            document.querySelectorAll('#gradeSelection .select-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.select-btn').classList.add('active');
            
            document.getElementById('typeSelection').classList.remove('hidden');
            document.getElementById('typeSelection').scrollIntoView({ behavior: 'smooth' });
        }

        function selectType(type) {
            selectedType = type;
            document.querySelectorAll('#typeSelection .select-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.select-btn').classList.add('active');
            
            document.getElementById('examSection').classList.remove('hidden');
            document.getElementById('examSection').scrollIntoView({ behavior: 'smooth' });
            
            generateNewQuestion();
        }

        async function generateNewQuestion() {
            const questionContent = document.getElementById('questionContent');
            const examTitle = document.getElementById('examTitle');
            const instructionsList = document.getElementById('instructionsList');
            
            questionContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在生成题目... | Generating question...</p></div>';
            
            document.getElementById('evaluationSection').classList.add('hidden');
            resetRecording();
            
            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
			"x-api-key": "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",
    			"anthropic-version": "2023-06-01"
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 1000,
                        messages: [{
                            role: "user",
                            content: getQuestionPrompt()
                        }]
                    })
                });

                const data = await response.json();
                const content = data.content[0].text;
                currentQuestion = JSON.parse(content);
                
                if (selectedType === 'reading') {
                    examTitle.textContent = '朗读短文 | Reading Aloud';
                    instructionsList.innerHTML = `
                        <li>请大声朗读以下短文 | Please read the passage aloud</li>
                        <li>注意发音、语调和流畅度 | Pay attention to pronunciation, intonation, and fluency</li>
                        <li>点击"开始录音"按钮开始 | Click "Start Recording" to begin</li>
                    `;
                    questionContent.innerHTML = `
                        <div class="passage">${currentQuestion.passage}</div>
                    `;
                } else {
                    examTitle.textContent = '看图说话 | Picture Description';
                    instructionsList.innerHTML = `
                        <li>观察图片并描述你所看到的 | Observe the picture and describe what you see</li>
                        <li>说明图中发生了什么事 | Explain what is happening in the picture</li>
                        <li>表达你的观察和想法 | Express your observations and thoughts</li>
                        <li>说话时间至少1分钟 | Speak for at least 1 minute</li>
                    `;
                    questionContent.innerHTML = `
                        <div class="image-container">
                            <img src="${currentQuestion.imageUrl}" alt="Exam Picture" />
                            <p style="margin-top: 1rem; color: var(--text-secondary);">
                                <strong>提示 | Hints:</strong> ${currentQuestion.hints}
                            </p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error generating question:', error);
                questionContent.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--accent);">
                        <p>生成题目时出错，请重试 | Error generating question, please try again</p>
                    </div>
                `;
            }
        }

        function getQuestionPrompt() {
            if (selectedType === 'reading') {
                return `Generate a Chinese reading passage for ${selectedGrade} students based on Singapore MOE curriculum standards. The passage should be age-appropriate and test pronunciation, intonation, and fluency.

Return ONLY a JSON object (no markdown, no backticks) with this structure:
{
    "passage": "The Chinese text passage here (150-300 characters depending on grade level)"
}

For ${selectedGrade}:
- P3: 100-150 characters, simple vocabulary
- P4: 150-200 characters, moderate vocabulary
- P5: 200-250 characters, varied sentence structures
- P6: 250-300 characters, complex vocabulary and idioms

Make the passage engaging and educational.`;
            } else {
                return `Generate a picture description scenario for ${selectedGrade} Chinese oral exam based on Singapore MOE curriculum.

Return ONLY a JSON object (no markdown, no backticks) with this structure:
{
    "imageUrl": "https://source.unsplash.com/800x600/?singapore,school,children,family,park,classroom,playground,library",
    "hints": "Chinese hints about what to describe (e.g., 人物、地点、活动、感受)"
}

The imageUrl should be from Unsplash with relevant keywords for a school-appropriate scene that ${selectedGrade} students can describe in Chinese.`;
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Initialize speech recognition
                if ('webkitSpeechRecognition' in window) {
                    const recognition = new webkitSpeechRecognition();
                    recognition.lang = 'zh-CN';
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    
                    recognition.onresult = (event) => {
                        let interimTranscript = '';
                        let finalTranscript = '';
                        
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const transcriptPiece = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                finalTranscript += transcriptPiece;
                            } else {
                                interimTranscript += transcriptPiece;
                            }
                        }
                        
                        transcript += finalTranscript;
                    };
                    
                    recognition.start();
                    window.currentRecognition = recognition;
                }
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.start();
                
                document.getElementById('startRecordBtn').classList.add('hidden');
                document.getElementById('stopRecordBtn').classList.remove('hidden');
                document.getElementById('recordingStatus').classList.remove('hidden');
                
                recordingSeconds = 0;
                updateTimer();
                recordingTimer = setInterval(updateTimer, 1000);
                
            } catch (error) {
                console.error('Error accessing microphone:', error);
                alert('无法访问麦克风，请检查权限设置 | Cannot access microphone, please check permissions');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                if (window.currentRecognition) {
                    window.currentRecognition.stop();
                }
                
                clearInterval(recordingTimer);
                
                document.getElementById('stopRecordBtn').classList.add('hidden');
                document.getElementById('submitBtn').classList.remove('hidden');
                document.getElementById('recordingStatus').classList.add('hidden');
            }
        }

        function updateTimer() {
            recordingSeconds++;
            const minutes = Math.floor(recordingSeconds / 60);
            const seconds = recordingSeconds % 60;
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function resetRecording() {
            transcript = '';
            recordingSeconds = 0;
            document.getElementById('startRecordBtn').classList.remove('hidden');
            document.getElementById('stopRecordBtn').classList.add('hidden');
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('recordingStatus').classList.add('hidden');
            document.getElementById('timer').textContent = '00:00';
        }

        async function submitAnswer() {
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('loadingSection').classList.remove('hidden');
            
            try {
                const evaluationPrompt = getEvaluationPrompt();
                
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
			"x-api-key": "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",
    			"anthropic-version": "2023-06-01"
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 2000,
                        messages: [{
                            role: "user",
                            content: evaluationPrompt
                        }]
                    })
                });

                const data = await response.json();
                const evaluation = JSON.parse(data.content[0].text);
                
                displayEvaluation(evaluation);
                
            } catch (error) {
                console.error('Error evaluating answer:', error);
                alert('评分时出错，请重试 | Error during evaluation, please try again');
            } finally {
                document.getElementById('loadingSection').classList.add('hidden');
            }
        }

        function getEvaluationPrompt() {
            const duration = recordingSeconds;
            
            if (selectedType === 'reading') {
                return `Evaluate this Chinese oral reading performance based on Singapore MOE PSLE standards for ${selectedGrade}.

Original passage:
${currentQuestion.passage}

Student's transcribed speech:
${transcript || '(No speech detected - please evaluate based on typical performance)'}

Recording duration: ${duration} seconds

Provide evaluation in JSON format (no markdown, no backticks):
{
    "overallScore": 85,
    "pronunciation": {
        "score": 80,
        "feedback": "Detailed Chinese feedback on pronunciation accuracy"
    },
    "intonation": {
        "score": 85,
        "feedback": "Detailed Chinese feedback on intonation and expression"
    },
    "fluency": {
        "score": 90,
        "feedback": "Detailed Chinese feedback on reading fluency"
    },
    "accuracy": {
        "score": 85,
        "feedback": "Detailed Chinese feedback on text accuracy"
    },
    "overallFeedback": "Overall Chinese feedback and encouragement",
    "areasForImprovement": "Specific areas to work on in Chinese"
}

Base scoring on MOE rubrics. Be constructive and encouraging.`;
            } else {
                return `Evaluate this Chinese picture description performance based on Singapore MOE PSLE standards for ${selectedGrade}.

Picture description task with hints: ${currentQuestion.hints}

Student's transcribed speech:
${transcript || '(No speech detected - please evaluate based on typical performance)'}

Speaking duration: ${duration} seconds

Provide evaluation in JSON format (no markdown, no backticks):
{
    "overallScore": 85,
    "content": {
        "score": 80,
        "feedback": "Detailed Chinese feedback on content quality and completeness"
    },
    "vocabulary": {
        "score": 85,
        "feedback": "Detailed Chinese feedback on vocabulary usage"
    },
    "pronunciation": {
        "score": 88,
        "feedback": "Detailed Chinese feedback on pronunciation"
    },
    "expression": {
        "score": 82,
        "feedback": "Detailed Chinese feedback on language expression and sentence structures"
    },
    "overallFeedback": "Overall Chinese feedback and encouragement",
    "areasForImprovement": "Specific areas to work on in Chinese"
}

Base scoring on MOE rubrics. Be constructive and encouraging.`;
            }
        }

        function displayEvaluation(evaluation) {
            const evalSection = document.getElementById('evaluationSection');
            
            let criteriaHTML = '';
            const criteriaKeys = Object.keys(evaluation).filter(key => 
                typeof evaluation[key] === 'object' && evaluation[key].score !== undefined
            );
            
            criteriaKeys.forEach(key => {
                const criteria = evaluation[key];
                const displayName = {
                    'pronunciation': '发音 Pronunciation',
                    'intonation': '语调 Intonation',
                    'fluency': '流畅度 Fluency',
                    'accuracy': '准确度 Accuracy',
                    'content': '内容 Content',
                    'vocabulary': '词汇 Vocabulary',
                    'expression': '表达 Expression'
                };
                
                criteriaHTML += `
                    <div class="feedback-item">
                        <h4>${displayName[key]} - ${criteria.score}/100</h4>
                        <p>${criteria.feedback}</p>
                    </div>
                `;
            });
            
            evalSection.innerHTML = `
                <div class="evaluation">
                    <div class="score-display">
                        <div class="score-circle">
                            <span class="score-value">${evaluation.overallScore}</span>
                        </div>
                        <h3 style="color: var(--success); font-size: 1.5rem;">总分 Overall Score: ${evaluation.overallScore}/100</h3>
                    </div>
                    
                    <div class="feedback-section">
                        <h3 style="color: var(--primary); margin-bottom: 1rem;">详细评分 Detailed Feedback</h3>
                        ${criteriaHTML}
                        
                        <div class="feedback-item" style="background: linear-gradient(135deg, #FFF9E6 0%, #FFFBF0 100%); border-left-color: var(--secondary);">
                            <h4>总体评价 Overall Feedback</h4>
                            <p>${evaluation.overallFeedback}</p>
                        </div>
                        
                        <div class="feedback-item" style="background: linear-gradient(135deg, #FFE5E5 0%, #FFF0F0 100%); border-left-color: var(--accent);">
                            <h4>改进建议 Areas for Improvement</h4>
                            <p>${evaluation.areasForImprovement}</p>
                        </div>
                    </div>
                </div>
            `;
            
            evalSection.classList.remove('hidden');
            evalSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Chinese Oral Exam Practice App Loaded');
        });
    </script>
</body>
</html>
